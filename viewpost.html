<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Post</title>
    <link rel="stylesheet" href="styles/viewpost.css">
</head>
<body>
    <div class="post-container">
        <span class="post-title" id="postTitle"><h1>Post Title 1</h1></span>
        <div class="post-category">
            <span class="category-label" id="category">Category: </span>
        </div>
        <br>
        <div class="post-content">
            <p>Post content goes here...</p>
        </div>
        <div class="post-actions">
            <button class="upvote">Upvote <span class="icon">👍</span></button>
            <button class="downvote">Downvote <span class="icon">👎</span></button>
            <button class="comment">Comment <span class="icon">💬</span></button>
        </div>
        <div class="post-footer">
            <a href="login.html">Login to vote, comment, or post</a>
        </div>
        <div class="comments-section">
            <h3>Comments</h3>
            <p>Comments go here...</p>
        </div>
    </div>

   <script>
    const categories = {
        1: 'Electronic Schemas',
        2: 'Hardware Repair & Teardown',
        3: 'Firmware Mods',
        4: 'Mobile Development',
        5: 'Sideloading'
    };

    const url = new URL(window.location.href);
    const categoryId = url.searchParams.get('category') || '1';
    const postTitle = url.searchParams.get('title') || 'Post Title 1';
    const category = categories[categoryId] || 'Electronic Schemas';
    
    document.getElementById('category').textContent = 'Category: ' + category;
    document.getElementById('postTitle').querySelector('h1').textContent = postTitle;
</script>
</body>
</html>

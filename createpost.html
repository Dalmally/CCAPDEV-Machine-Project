<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | Tech Mod Forum</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        
        input[type="text"], select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px;
        }
        
        textarea { resize: vertical; min-height: 200px; }
        
        .btn-submit {
            background-color: #28a745; color: white; border: none; padding: 12px 24px;
            font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; transition: background 0.3s;
        }
        
        .btn-submit:hover { background-color: #218838; }
        .back-link { display: inline-block; margin-top: 15px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Create a New Post</h1>
    <form action="submit_post_handler.html" method="POST">
        
        <div class="form-group">
            <label for="post-title">Post Title</label>
            <input type="text" id="post-title" name="title" placeholder="e.g. How to flash custom BIOS" required>
        </div>

        <div class="form-group">
            <label for="category">Select Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>-- Choose a category --</option>
                <option value="1">Electronic Schemas</option>
                <option value="2">Hardware Repair & Teardown</option>
                <option value="3">Firmware Mods</option>
                <option value="4">Mobile Development</option>
                <option value="5">Sideloading</option>
            </select>
        </div>

        <div class="form-group">
            <label for="content">Post Content</label>
            <textarea id="content" name="content" placeholder="Describe your mod or ask a question..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Publish to Forum</button>
    </form>
    
    <a href="home.html" class="back-link">← Back to Home</a>
</div>

</body>
</html>
